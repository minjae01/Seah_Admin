  <body>
    <div class="container">
      <h1>태블릿 / 충전함 관리 엑셀 생성기</h1>
      <div class="desc">
        정렬 옵션을 선택해서 모델명, 배치 위치, 구분 기준으로 정렬할 수 있어.
        <br />
        수량이 안 맞는 태블릿 모델은 표 안이 아니라 위쪽 요약 박스에서 따로
        빨간색으로 보여줘.
      </div>

      <div class="layout">
        <div class="panel">
          <h2>장비 입력</h2>
          <div class="pill">기본 데이터 미리 입력됨</div>

          <label for="deviceType">구분</label>
          <select id="deviceType">
            <option value="tablet">태블릿</option>
            <option value="charger">충전함</option>
            <option value="desktop">데스크탑</option>
            <option value="monitor">모니터</option>
            <option value="etc">기타</option>
          </select>

          <label for="model">모델명</label>
          <input id="model" type="text" placeholder="예: SM-T720" />

          <label for="location">배치 위치</label>
          <input
            id="location"
            type="text"
            placeholder="예: 1학년 연구실 / 2-5 / 전담실"
          />

          <div class="row-3">
            <div>
              <label for="qty">수량</label>
              <input id="qty" type="number" min="1" value="1" />
            </div>
            <div>
              <label for="totalQty">모델 총 수량</label>
              <input id="totalQty" type="number" min="0" value="0" />
            </div>
            <div>
              <label for="rfidRequired">RFID 등록 필요</label>
              <select id="rfidRequired">
                <option value="N">아니오</option>
                <option value="Y">예</option>
              </select>
            </div>
          </div>

          <label for="note">비고</label>
          <textarea
            id="note"
            placeholder="예: 전담실 7대는 충북지영 증정(RFID 등록 불가)"
          ></textarea>

          <div class="btn-row">
            <button class="primary" onclick="addItem()">추가</button>
            <button class="secondary" onclick="resetForm()">
              입력칸 초기화
            </button>
          </div>

          <label for="globalMemo">엑셀 오른쪽 메모</label>
          <textarea id="globalMemo" class="memo-box">
1대 분실->불용처리예정
4-4 키보드 10개 중 6개 새로 교환, 4개 분실 처리함</textarea
          >

          <div class="btn-row-3">
            <button class="green" onclick="downloadExcel()">
              엑셀 다운로드
            </button>
            <button class="secondary" onclick="copyItemsCode()">
              코드 복사
            </button>
            <button class="danger" onclick="resetAllData()">전체 초기화</button>
          </div>

          <div class="hint">
            같은 모델을 추가할 때 이미 등록된 총수량이 있으면 자동으로 총수량이
            채워져.
            <br />
            데이터는 브라우저에 자동 저장돼.
          </div>
        </div>

        <div class="right-panels">
          <div class="panel">
            <h2>입력된 목록</h2>

            <div class="stats" id="statsArea"></div>

            <div id="mismatchArea"></div>

            <div class="toolbar">
              <div class="sort-wrap">
                <label for="sortOption" style="margin: 0 0 6px"
                  >정렬 옵션</label
                >
                <select id="sortOption">
                  <option value="default">기본순</option>
                  <option value="model">모델명 정렬</option>
                  <option value="location">배치 위치별 정렬</option>
                  <option value="type">구분별 정렬</option>
                </select>
              </div>

              <button class="secondary small-btn" onclick="applySortOption()">
                정렬 적용
              </button>
              <button class="secondary small-btn" onclick="saveData()">
                저장
              </button>
              <button class="secondary small-btn" onclick="loadData()">
                저장값 다시 불러오기
              </button>
              <button class="secondary small-btn" onclick="loadDefaultData()">
                기본 데이터로 복원
              </button>
            </div>

            <div class="table-wrap">
              <table id="previewTable">
                <thead>
                  <tr>
                    <th style="width: 60px">번호</th>
                    <th style="width: 100px">구분</th>
                    <th style="width: 160px">모델명</th>
                    <th>배치 위치</th>
                    <th style="width: 80px">수량</th>
                    <th style="width: 90px">총수량</th>
                    <th style="width: 90px">배치합</th>
                    <th style="width: 90px">RFID</th>
                    <th>비고</th>
                    <th style="width: 90px">삭제</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>
          </div>

          <div class="panel">
            <h2>현재 데이터 코드 (items 배열)</h2>
            <div class="sub">
              화면에서 추가/삭제한 상태가 그대로 반영된 코드야.
            </div>
            <textarea id="itemsCode" class="code-box" readonly></textarea>
          </div>
        </div>
      </div>
    </div>

      function getLocationOrder(location) {
        const special = {
          '1학년 연구실': 1,
          유치원: 2,
          전담실: 3,
          교무실: 98,
          교감선생님: 99,
          컴퓨터실: 100,
          '늘봄 지원실(1층)': 101,
          '2학년 교실 끝쪽 방과후 교실': 102,
        };

        if (special[location] !== undefined) return special[location];

        const match = location.match(/^(\d)-(\d)$/);
        if (match) {
          const grade = Number(match[1]);
          const cls = Number(match[2]);
          return grade * 10 + cls;
        }

        return 999;
      }

      function sortByDefault(arr) {
        return arr.sort((a, b) => {
          const typeDiff =
            (typeOrder[a.deviceType] || 999) - (typeOrder[b.deviceType] || 999);
          if (typeDiff !== 0) return typeDiff;

          const modelDiff =
            (modelOrder[a.model] || 9999) - (modelOrder[b.model] || 9999);
          if (modelDiff !== 0) return modelDiff;

          const locDiff =
            getLocationOrder(a.location) - getLocationOrder(b.location);
          if (locDiff !== 0) return locDiff;

          return a.location.localeCompare(b.location, 'ko');
        });
      }

      function sortByModel(arr) {
        return arr.sort((a, b) => {
          const modelDiff = a.model.localeCompare(b.model, 'ko');
          if (modelDiff !== 0) return modelDiff;

          const typeDiff =
            (typeOrder[a.deviceType] || 999) - (typeOrder[b.deviceType] || 999);
          if (typeDiff !== 0) return typeDiff;

          const locDiff =
            getLocationOrder(a.location) - getLocationOrder(b.location);
          if (locDiff !== 0) return locDiff;

          return a.location.localeCompare(b.location, 'ko');
        });
      }

      function sortByLocation(arr) {
        return arr.sort((a, b) => {
          const locDiff =
            getLocationOrder(a.location) - getLocationOrder(b.location);
          if (locDiff !== 0) return locDiff;

          const locTextDiff = a.location.localeCompare(b.location, 'ko');
          if (locTextDiff !== 0) return locTextDiff;

          const typeDiff =
            (typeOrder[a.deviceType] || 999) - (typeOrder[b.deviceType] || 999);
          if (typeDiff !== 0) return typeDiff;

          return a.model.localeCompare(b.model, 'ko');
        });
      }

      function sortByType(arr) {
        return arr.sort((a, b) => {
          const typeDiff =
            (typeOrder[a.deviceType] || 999) - (typeOrder[b.deviceType] || 999);
          if (typeDiff !== 0) return typeDiff;

          const modelDiff = a.model.localeCompare(b.model, 'ko');
          if (modelDiff !== 0) return modelDiff;

          const locDiff =
            getLocationOrder(a.location) - getLocationOrder(b.location);
          if (locDiff !== 0) return locDiff;

          return a.location.localeCompare(b.location, 'ko');
        });
      }

      function applySortOption() {

        if (option === 'default') {
          sortByDefault(items);
        } else if (option === 'model') {
          sortByModel(items);
        } else if (option === 'location') {
          sortByLocation(items);
        } else if (option === 'type') {
          sortByType(items);
        }

        saveDataSilently();
        renderAll();
      }

      function getModelSummary(model, deviceType) {
        const rows = items.filter(
          (i) => i.model === model && i.deviceType === deviceType,
        );
        const assignedQty = rows.reduce((sum, i) => sum + Number(i.qty), 0);

        const totalQtyValues = rows
          .map((i) => Number(i.totalQty || 0))
          .filter((v) => !isNaN(v) && v > 0);

        const totalQty = totalQtyValues.length ? totalQtyValues[0] : 0;
        const isMismatch =
          deviceType === 'tablet' && totalQty > 0 && totalQty !== assignedQty;

        return {
          totalQty,
          assignedQty,
          isMismatch,
          diff: totalQty - assignedQty,
        };
      }

      function getMismatchModels() {
        const uniqueKeys = [
          ...new Set(
            items
              .filter((i) => i.deviceType === 'tablet')
              .map((i) => `${i.deviceType}__${i.model}`),
          ),
        ];

        return uniqueKeys
          .map((key) => {
            const [deviceType, model] = key.split('__');
            const summary = getModelSummary(model, deviceType);
            return { model, deviceType, ...summary };
          })
          .filter((item) => item.isMismatch)
          .sort((a, b) => {
            const orderA = modelOrder[a.model] || 9999;
            const orderB = modelOrder[b.model] || 9999;
            return orderA - orderB;
          });
      }

      function escapeJsString(str) {
        return String(str)
          .replace(/\\/g, '\\\\')
          .replace(/"/g, '\\"')
          .replace(/\n/g, '\\n');
      }

      function generateItemsCode() {
        const lines = items.map((item) => {
          return `  { deviceType: "${escapeJsString(item.deviceType)}", model: "${escapeJsString(item.model)}", location: "${escapeJsString(item.location)}", qty: ${Number(item.qty)}, totalQty: ${Number(item.totalQty || 0)}, rfidRequired: "${escapeJsString(item.rfidRequired)}", note: "${escapeJsString(item.note || '')}" }`;
        });

        return `const items = [
${lines.join(',\n')}
];`;
      }

        const grouped = {};
        data.forEach((item) => {
          if (!grouped[item.model]) grouped[item.model] = [];
          grouped[item.model].push(item);
        });

        const sortedKeys = Object.keys(grouped).sort(
          (a, b) => (modelOrder[a] || 9999) - (modelOrder[b] || 9999),
        );
        const sortedGrouped = {};
        sortedKeys.forEach((key) => {
          sortedGrouped[key] = grouped[key].sort((x, y) => {
            const diff =
              getLocationOrder(x.location) - getLocationOrder(y.location);
            if (diff !== 0) return diff;
            return x.location.localeCompare(y.location, 'ko');
          });
        });

        return sortedGrouped;
      }

      function setCell(ws, addr, value, style = {}) {
        const baseBorder = {
          top: { style: 'thin', color: { rgb: '000000' } },
          bottom: { style: 'thin', color: { rgb: '000000' } },
          left: { style: 'thin', color: { rgb: '000000' } },
          right: { style: 'thin', color: { rgb: '000000' } },
        };

        const baseStyle = {
          alignment: {
            horizontal: 'center',
            vertical: 'center',
            wrapText: true,
          },
          border: baseBorder,
          font: { name: 'Malgun Gothic', sz: 10 },
        };

        ws[addr] = {
          v: value,
          t: typeof value === 'number' ? 'n' : 's',
          s: { ...baseStyle, ...style },
        };
      }

      function fillModelBlock(
        ws,
        startRow,
        title,
        grouped,
        titleColor,
        deviceType,
      ) {
        let row = startRow;

        setCell(ws, `A${row}`, title, {
          fill: { fgColor: { rgb: titleColor } },
          font: { bold: true, name: 'Malgun Gothic', sz: 11 },
        });
        row++;

        Object.keys(grouped).forEach((model) => {
          const modelItems = grouped[model];
          const fillColor = modelColors[model] || 'E5E7EB';
          const summary = getModelSummary(model, deviceType);
          const isMismatch = summary.isMismatch;

          setCell(ws, `A${row}`, model, {
            fill: { fgColor: { rgb: isMismatch ? 'F4CCCC' : fillColor } },
            font: {
              bold: true,
              color: { rgb: isMismatch ? 'C00000' : '000000' },
            },
          });

          modelItems.forEach((item, idx) => {
            const col = XLSX.utils.encode_col(idx + 1);
            setCell(ws, `${col}${row}`, item.location, {
              fill: { fgColor: { rgb: isMismatch ? 'F4CCCC' : fillColor } },
              font: {
                bold: true,
                color: { rgb: isMismatch ? 'C00000' : '000000' },
              },
            });
          });

          row++;

          setCell(ws, `A${row}`, summary.totalQty || 0, {
            fill: { fgColor: { rgb: isMismatch ? 'FDE9D9' : 'FFFFFF' } },
            font: {
              bold: true,
              color: { rgb: isMismatch ? 'C00000' : '000000' },
            },
          });

          modelItems.forEach((item, idx) => {
            const col = XLSX.utils.encode_col(idx + 1);
            setCell(ws, `${col}${row}`, Number(item.qty), {
              font: { color: { rgb: isMismatch ? 'C00000' : '000000' } },
            });
          });

          row++;
        });

        return row;
      }

      function downloadExcel() {
        if (!items.length) {
          alert('데이터가 없어.');
          return;
        }

        const wb = XLSX.utils.book_new();
        const ws = {};

        const tabletItems = items.filter((i) => i.deviceType === 'tablet');
        const chargerItems = items.filter((i) => i.deviceType === 'charger');
        const desktopItems = items.filter((i) => i.deviceType === 'desktop');
        const monitorItems = items.filter((i) => i.deviceType === 'monitor');
        const etcItems = items.filter((i) => i.deviceType === 'etc');

        let row = 1;

        const tabletGrouped = groupByModel(tabletItems);
        row = fillModelBlock(
          ws,
          row,
          '태블릿',
          tabletGrouped,
          'FFF2CC',
          'tablet',
        );

        const tabletTotal = tabletItems.reduce((s, i) => s + Number(i.qty), 0);
        setCell(ws, `A${row}`, '총잔량', {
          fill: { fgColor: { rgb: 'FCE5CD' } },
          font: { bold: true },
        });
        setCell(ws, `B${row}`, tabletTotal, {
          fill: { fgColor: { rgb: 'FCE5CD' } },
          font: { bold: true },
        });

        row += 2;

        const chargerGrouped = groupByModel(chargerItems);
        row = fillModelBlock(
          ws,
          row,
          '충전함',
          chargerGrouped,
          'FCE5CD',
          'charger',
        );

        const chargerTotal = chargerItems.reduce(
          (s, i) => s + Number(i.qty),
          0,
        );
        setCell(ws, `A${row}`, '총잔량', {
          fill: { fgColor: { rgb: 'FCE5CD' } },
          font: { bold: true },
        });
        setCell(ws, `B${row}`, chargerTotal, {
          fill: { fgColor: { rgb: 'FCE5CD' } },
          font: { bold: true },
        });

        let sideRow = 22;

        if (desktopItems.length) {
          const desktopGrouped = groupByModel(desktopItems);
          setCell(ws, `L${sideRow}`, '데스크탑', {
            fill: { fgColor: { rgb: '58C4DD' } },
            font: { bold: true },
          });
          setCell(ws, `M${sideRow}`, 'RFID 등록 필요', {
            font: { bold: true, color: { rgb: 'FF0000' } },
          });
          sideRow++;

          Object.keys(desktopGrouped).forEach((model) => {
            const rows = desktopGrouped[model];
            const total = rows.reduce((sum, i) => sum + Number(i.qty), 0);
            setCell(ws, `L${sideRow}`, model, {
              fill: { fgColor: { rgb: 'BEE3F8' } },
            });
            setCell(ws, `M${sideRow}`, rows.map((r) => r.location).join(', '));
            setCell(ws, `Q${sideRow}`, `총 ${total}대`);
            sideRow++;
          });
        }

        sideRow += 2;

        if (monitorItems.length) {
          const monitorGrouped = groupByModel(monitorItems);
          setCell(ws, `L${sideRow}`, '모니터', {
            fill: { fgColor: { rgb: 'D9D9D9' } },
            font: { bold: true },
          });
          setCell(ws, `M${sideRow}`, 'RFID 등록 필요', {
            font: { bold: true, color: { rgb: 'FF0000' } },
          });
          sideRow++;

          Object.keys(monitorGrouped).forEach((model) => {
            const rows = monitorGrouped[model];
            const total = rows.reduce((sum, i) => sum + Number(i.qty), 0);
            const text = rows
              .map((r) => (r.note ? `${r.location}, ${r.note}` : r.location))
              .join(', ');
            setCell(ws, `L${sideRow}`, model, {
              fill: { fgColor: { rgb: 'BEE3F8' } },
            });
            setCell(ws, `M${sideRow}`, text);
            setCell(ws, `Q${sideRow}`, `총 ${total}대`);
            sideRow++;
          });
        }

        if (etcItems.length) {
          sideRow += 2;
          setCell(ws, `L${sideRow}`, '기타', {
            fill: { fgColor: { rgb: 'E9D5FF' } },
            font: { bold: true },
          });
          sideRow++;

          etcItems.forEach((item) => {
            setCell(ws, `L${sideRow}`, item.model);
            setCell(ws, `M${sideRow}`, item.location);
            setCell(ws, `N${sideRow}`, Number(item.qty));
            setCell(ws, `O${sideRow}`, item.note || '');
            sideRow++;
          });
        }

        const memo = document.getElementById('globalMemo').value.trim();
        if (memo) {
          const memoLines = memo.split('\n');
          let memoRow = 4;
          memoLines.forEach((line) => {
            setCell(ws, `L${memoRow}`, line, {
              alignment: {
                horizontal: 'left',
                vertical: 'center',
                wrapText: true,
              },
              font: { name: 'Malgun Gothic', sz: 10 },
            });
            memoRow += 4;
          });
        }

        ws['!cols'] = [
          { wch: 16 },
          { wch: 14 },
          { wch: 14 },
          { wch: 14 },
          { wch: 14 },
          { wch: 14 },
          { wch: 14 },
          { wch: 14 },
          { wch: 14 },
          { wch: 14 },
          { wch: 4 },
          { wch: 16 },
          { wch: 22 },
          { wch: 18 },
          { wch: 18 },
          { wch: 18 },
          { wch: 10 },
        ];

        ws['!ref'] = XLSX.utils.encode_range({
          s: { r: 0, c: 0 },
          e: { r: Math.max(row + 4, sideRow + 2), c: 16 },
        });

        XLSX.utils.book_append_sheet(wb, ws, '장비 관리');
        XLSX.writeFile(wb, '장비_관리대장.xlsx');
      }

      document.getElementById('globalMemo').addEventListener('input', () => {
        saveDataSilently();
      });

      document.getElementById('model').addEventListener('input', () => {
        const model = document.getElementById('model').value.trim();
        const type = document.getElementById('deviceType').value;
        const found = items.find(
          (i) =>
            i.model === model &&
            i.deviceType === type &&
            Number(i.totalQty || 0) > 0,
        );
        if (found) {
          document.getElementById('totalQty').value = found.totalQty;
        }
      });

      document.getElementById('deviceType').addEventListener('change', () => {
        const model = document.getElementById('model').value.trim();
        const type = document.getElementById('deviceType').value;
        const found = items.find(
          (i) =>
            i.model === model &&
            i.deviceType === type &&
            Number(i.totalQty || 0) > 0,
        );
        if (found) {
          document.getElementById('totalQty').value = found.totalQty;
        } else {
          document.getElementById('totalQty').value = '0';
        }
      });

      (function init() {
        const saved = localStorage.getItem(STORAGE_KEY_ITEMS);
        const savedMemo = localStorage.getItem(STORAGE_KEY_MEMO);

        if (saved) {
          items = JSON.parse(saved);
        } else {
          items = deepClone(defaultItems);
        }

        if (savedMemo !== null) {
          document.getElementById('globalMemo').value = savedMemo;
        } else {
          document.getElementById('globalMemo').value = DEFAULT_MEMO;
        }

        renderAll();
      })();
    </script>
  </body>
</html>
