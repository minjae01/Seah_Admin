<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>선물 도착</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
        background: linear-gradient(180deg, #fff8e8 0%, #fff2cc 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #2b2b2b;
        padding: 20px;
      }

      .phone {
        width: 100%;
        max-width: 390px;
        background: #fff;
        border-radius: 28px;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.12);
        overflow: hidden;
        position: relative;
      }

      .topbar {
        background: #ffde59;
        padding: 18px 20px;
        font-weight: 700;
        font-size: 18px;
        text-align: center;
      }

      .screen {
        padding: 26px 22px 30px;
        min-height: 620px;
        display: none;
        flex-direction: column;
        justify-content: space-between;
      }

      .screen.active {
        display: flex;
      }

      .badge {
        display: inline-block;
        background: #fff3b3;
        color: #7a5a00;
        font-size: 13px;
        padding: 7px 12px;
        border-radius: 999px;
        font-weight: 700;
        margin-bottom: 16px;
      }

      .title {
        font-size: 28px;
        font-weight: 800;
        line-height: 1.35;
        margin: 0 0 10px;
      }

      .desc {
        font-size: 15px;
        line-height: 1.6;
        color: #666;
        margin-bottom: 22px;
      }

      .gift-card {
        background: linear-gradient(135deg, #fff7cc, #ffe789);
        border-radius: 22px;
        padding: 20px;
        box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.04);
        margin-bottom: 22px;
      }

      .gift-label {
        font-size: 13px;
        color: #8a6b00;
        font-weight: 700;
        margin-bottom: 8px;
      }

      .gift-name {
        font-size: 24px;
        font-weight: 800;
        margin-bottom: 12px;
      }

      .gift-info {
        background: rgba(255, 255, 255, 0.65);
        border-radius: 16px;
        padding: 14px;
        font-size: 14px;
        line-height: 1.7;
        color: #444;
      }

      .gift-info b {
        color: #222;
      }

      .button {
        width: 100%;
        border: none;
        border-radius: 16px;
        background: #111;
        color: #fff;
        font-size: 17px;
        font-weight: 800;
        padding: 18px 16px;
        cursor: pointer;
        transition:
          transform 0.15s ease,
          opacity 0.15s ease;
      }

      .button:active {
        transform: scale(0.98);
      }

      .subtext {
        margin-top: 12px;
        text-align: center;
        font-size: 12px;
        color: #888;
      }

      .loading-wrap {
        align-items: center;
        justify-content: center;
        gap: 18px;
        text-align: center;
      }

      .spinner {
        width: 62px;
        height: 62px;
        border: 6px solid #f4f4f4;
        border-top: 6px solid #ffcf00;
        border-radius: 50%;
        animation: spin 0.85s linear infinite;
      }

      .loading-text {
        font-size: 20px;
        font-weight: 800;
      }

      .loading-sub {
        color: #777;
        font-size: 14px;
        line-height: 1.6;
      }

      .result-wrap {
        text-align: center;
        justify-content: center;
        gap: 18px;
      }

      .emoji {
        font-size: 68px;
      }

      .result-title {
        font-size: 30px;
        font-weight: 900;
        margin: 0;
      }

      .result-desc {
        font-size: 16px;
        color: #555;
        line-height: 1.7;
        margin: 0;
      }

      .small-card {
        background: #fff7db;
        border-radius: 18px;
        padding: 16px;
        font-size: 14px;
        color: #5f4b00;
        line-height: 1.7;
      }

      .again-btn {
        background: #ffde59;
        color: #222;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="phone">
      <div class="topbar">선물 도착</div>

      <!-- 첫 화면 -->
      <section class="screen active" id="screen1">
        <div>
          <div class="badge">친구가 선물을 보냈어요</div>
          <h1 class="title">선물이 도착했어요 🎁</h1>
          <div class="desc">아래 버튼을 눌러 선물을 확인해보세요.</div>

          <div class="gift-card">
            <div class="gift-label">받은 선물</div>
            <div class="gift-name">아이스 아메리카노 T</div>
            <div class="gift-info">
              보낸 사람: <b id="senderName">익명의 친구</b><br />
              사용 기한: <b>2026.04.30</b><br />
              메시지: <b>오늘도 힘내라 ☕</b>
            </div>
          </div>
        </div>

        <div>
          <button class="button" id="openGiftBtn">선물 확인하기</button>
          <div class="subtext">수령 버튼을 누르면 바로 확인할 수 있어요</div>
        </div>
      </section>

      <!-- 로딩 화면 -->
      <section class="screen loading-wrap" id="screen2">
        <div class="spinner"></div>
        <div class="loading-text">선물 불러오는 중...</div>
        <div class="loading-sub">유효한 쿠폰 정보를 확인하고 있어요</div>
      </section>

      <!-- 반전 화면 -->
      <section class="screen result-wrap" id="screen3">
        <div class="emoji">🎉</div>
        <h2 class="result-title">만우절 성공</h2>
        <p class="result-desc">
          커피는 없고<br />
          내 웃음만 선물로 보냈습니다 😎
        </p>

        <div class="small-card">
          그래도 속아줘서 고마움<br />
          오늘 하루 좋은 일만 생기길 ☀️
        </div>

        <button class="button again-btn" id="restartBtn">다시 보기</button>
      </section>
    </div>

    <script>
      const screen1 = document.getElementById('screen1');
      const screen2 = document.getElementById('screen2');
      const screen3 = document.getElementById('screen3');
      const openGiftBtn = document.getElementById('openGiftBtn');
      const restartBtn = document.getElementById('restartBtn');
      const senderName = document.getElementById('senderName');

      // 링크에 ?name=민재 이런 식으로 붙이면 보낸 사람 이름 바뀜
      const params = new URLSearchParams(location.search);
      const name = params.get('name');
      if (name) senderName.textContent = decodeURIComponent(name);

      function showScreen(target) {
        [screen1, screen2, screen3].forEach((s) =>
          s.classList.remove('active'),
        );
        target.classList.add('active');
      }

      openGiftBtn.addEventListener('click', () => {
        showScreen(screen2);
        setTimeout(() => {
          showScreen(screen3);
        }, 1800);
      });

      restartBtn.addEventListener('click', () => {
        showScreen(screen1);
      });
    </script>
  </body>
</html>
