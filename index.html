<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>세아초 장비 관리 시스템</title>

    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

    <style>
      * {
        box-sizing: border-box;
      }

      :root {
        --bg: #f4f7fb;
        --panel: #ffffff;
        --line: #d9e1ec;
        --text: #1f2937;
        --sub: #6b7280;
        --primary: #2563eb;
        --green: #16a34a;
        --purple: #7c3aed;
        --orange: #ea580c;
        --red: #ef4444;
        --shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
        --radius: 18px;
      }

      body {
        margin: 0;
        font-family: 'Malgun Gothic', Arial, sans-serif;
        background: linear-gradient(180deg, #f8fbff 0%, #f3f6fb 100%);
        color: var(--text);
      }

      .container {
        max-width: 1760px;
        margin: 0 auto;
        padding: 24px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 34px;
        font-weight: 800;
      }

      .desc {
        color: var(--sub);
        margin-bottom: 20px;
        line-height: 1.7;
        font-size: 14px;
      }

      .layout {
        display: grid;
        grid-template-columns: 450px 1fr;
        gap: 22px;
        align-items: start;
      }

      .left-panels {
        display: grid;
        gap: 20px;
        position: sticky;
        top: 20px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid #eef2f7;
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 20px;
      }

      .panel h2 {
        margin: 0 0 12px;
        font-size: 24px;
        font-weight: 800;
      }

      .sub {
        font-size: 12px;
        color: var(--sub);
        margin-bottom: 10px;
        line-height: 1.6;
      }

      .pill {
        display: inline-block;
        font-size: 12px;
        padding: 5px 10px;
        border-radius: 999px;
        background: #eef2ff;
        color: #4338ca;
        margin-bottom: 12px;
        font-weight: 700;
      }

      label {
        display: block;
        font-weight: 800;
        margin: 14px 0 7px;
        font-size: 14px;
      }

      input,
      select,
      textarea,
      button {
        width: 100%;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid #cfd8e3;
        font-size: 14px;
        background: #fff;
        transition: 0.18s ease;
      }

      input:focus,
      select:focus,
      textarea:focus {
        outline: none;
        border-color: #7aa2ff;
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.08);
      }

      textarea {
        resize: vertical;
        min-height: 96px;
        font-family: 'Malgun Gothic', Arial, sans-serif;
      }

      .memo-box {
        min-height: 120px;
      }

      .row-3 {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 10px;
      }

      .btn-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 15px;
      }

      button {
        cursor: pointer;
        font-weight: 800;
        border: none;
      }

      button:hover {
        transform: translateY(-1px);
      }

      .primary {
        background: linear-gradient(180deg, #3974ff 0%, #2563eb 100%);
        color: #fff;
      }

      .danger {
        background: linear-gradient(180deg, #ff6b6b 0%, #ef4444 100%);
        color: #fff;
      }

      .secondary {
        background: #e5e7eb;
        color: #111827;
      }

      .green {
        background: linear-gradient(180deg, #22c55e 0%, #16a34a 100%);
        color: #fff;
      }

      .orange {
        background: linear-gradient(180deg, #fb923c 0%, #ea580c 100%);
        color: #fff;
      }

      .purple {
        background: linear-gradient(180deg, #9f67ff 0%, #7c3aed 100%);
        color: #fff;
      }

      .editing-banner {
        background: #fff7ed;
        border: 1px solid #fdba74;
        color: #9a3412;
        padding: 10px 12px;
        border-radius: 12px;
        margin-top: 12px;
        display: none;
        font-weight: 800;
        font-size: 13px;
      }

      .status-box {
        margin-top: 12px;
        font-size: 12px;
        color: #475569;
        line-height: 1.6;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 10px 12px;
      }

      .stats {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }

      .stat {
        background: #f8fbff;
        border: 1px solid #dfe8f2;
        border-radius: 12px;
        padding: 9px 13px;
        font-size: 13px;
        font-weight: 700;
        color: #334155;
      }

      .warning-box {
        background: #fff7f7;
        border: 1px solid #fecaca;
        border-radius: 14px;
        padding: 15px;
        margin-bottom: 14px;
      }

      .warning-title {
        font-weight: 800;
        color: #b91c1c;
        margin-bottom: 10px;
        font-size: 15px;
      }

      .warning-empty {
        background: #f0fdf4;
        border: 1px solid #bbf7d0;
        color: #166534;
        border-radius: 14px;
        padding: 13px;
        margin-bottom: 14px;
        font-weight: 800;
        font-size: 14px;
      }

      .warning-list {
        display: grid;
        gap: 8px;
      }

      .warning-item {
        background: #fee2e2;
        border: 1px solid #fca5a5;
        border-radius: 12px;
        padding: 10px 12px;
        color: #991b1b;
        font-size: 13px;
        line-height: 1.6;
        font-weight: 700;
      }

      .toolbar {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: end;
        margin-bottom: 12px;
      }

      .toolbar button {
        width: auto;
        padding: 10px 13px;
      }

      .toolbar .sort-wrap {
        min-width: 230px;
      }

      .table-wrap {
        overflow: auto;
        border: 1px solid #dbe1ea;
        border-radius: 14px;
        background: #fff;
      }

      .model-table-wrap {
        max-height: 220px;
      }

      .inventory-table-wrap {
        max-height: 780px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 1100px;
      }

      th,
      td {
        border: 1px solid #e5e7eb;
        padding: 9px 8px;
        text-align: center;
        font-size: 13px;
        vertical-align: middle;
      }

      th {
        background: #eef4fb;
        position: sticky;
        top: 0;
        z-index: 1;
        font-weight: 800;
      }

      td.left {
        text-align: left;
      }

      .mini-table {
        min-width: 100%;
      }

      .small-btn {
        width: auto;
        padding: 6px 9px;
        font-size: 12px;
        border-radius: 9px;
      }

      .top-gap {
        margin-top: 8px;
      }

      .loading {
        opacity: 0.65;
        pointer-events: none;
      }

      .summary-modal {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.5);
        z-index: 9999;
        display: none;
        align-items: flex-start;
        justify-content: center;
        padding: 24px;
        overflow: auto;
      }

      .summary-modal-content {
        width: min(1500px, 100%);
        background: #fff;
        border-radius: 22px;
        box-shadow: 0 20px 50px rgba(15, 23, 42, 0.2);
        padding: 24px;
      }

      .summary-modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 18px;
      }

      .summary-modal-header h2 {
        margin: 0;
        font-size: 30px;
        font-weight: 900;
      }

      .summary-header-buttons {
        display: flex;
        gap: 10px;
      }

      .summary-board-wrap {
        background: linear-gradient(180deg, #f8fbff 0%, #f1f5f9 100%);
        border: 1px solid #e2e8f0;
        border-radius: 20px;
        padding: 20px;
      }

      .summary-section {
        margin-bottom: 28px;
      }

      .summary-section:last-child {
        margin-bottom: 0;
      }

      .summary-section-title {
        font-size: 22px;
        font-weight: 900;
        margin: 0 0 14px;
        color: #111827;
      }

      .summary-board {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 20px;
      }

      .summary-board.special-board {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .summary-card {
        background: #fff;
        border: 3px solid #222;
        border-radius: 30px;
        min-height: 180px;
        padding: 20px 16px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        text-align: center;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
      }

      .summary-card.placeholder {
        border-style: dashed;
        border-color: #cbd5e1;
        background: #f8fafc;
        box-shadow: none;
      }

      .summary-card-title {
        font-size: 52px;
        font-weight: 900;
        line-height: 1.05;
        margin-bottom: 12px;
        letter-spacing: -1px;
      }

      .summary-card-line {
        font-size: 18px;
        font-weight: 800;
        line-height: 1.35;
        word-break: keep-all;
      }

      .summary-card-empty {
        color: #94a3b8;
        font-size: 15px;
        font-weight: 700;
      }

      .summary-card-tags {
        display: flex;
        justify-content: center;
        gap: 6px;
        flex-wrap: wrap;
        margin-bottom: 8px;
      }

      .summary-tag {
        font-size: 11px;
        font-weight: 800;
        border-radius: 999px;
        padding: 4px 8px;
        border: 1px solid #dbeafe;
        background: #eff6ff;
        color: #1d4ed8;
      }

      @media (max-width: 1400px) {
        .summary-board {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }
      }

      @media (max-width: 1200px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .left-panels {
          position: static;
        }

        .summary-board {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .summary-board.special-board {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .summary-card-title {
          font-size: 42px;
        }
      }

      @media (max-width: 900px) {
        .summary-board,
        .summary-board.special-board {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>세아초 장비 관리 시스템</h1>
      <div class="desc"></div>

      <div class="layout">
        <div class="left-panels">
          <div class="panel">
            <h2>1. 모델 등록</h2>
            <div class="pill">device_models 저장</div>
            <div class="sub">여기서는 구분, 모델명, 모델 총 수량만 등록해.</div>

            <label for="modelType">구분</label>
            <select id="modelType">
              <option value="tablet">태블릿</option>
              <option value="charger">충전함</option>
              <option value="desktop">데스크탑</option>
              <option value="monitor">모니터</option>
              <option value="etc">기타</option>
            </select>

            <label for="modelName">모델명</label>
            <input id="modelName" type="text" placeholder="예: SM-T733" />

            <label for="modelTotalQty">모델 총 수량</label>
            <input id="modelTotalQty" type="number" min="0" value="0" />

            <div class="editing-banner" id="modelEditingBanner">
              현재 모델 수정 모드야.
            </div>

            <div class="btn-row">
              <button class="purple" id="saveModelButton">모델 추가</button>
              <button class="secondary" id="resetModelButton">
                입력칸 초기화
              </button>
            </div>

            <div class="btn-row top-gap">
              <button
                class="orange"
                id="updateModelButton"
                style="display: none"
              >
                모델 수정 저장
              </button>
              <button
                class="secondary"
                id="cancelModelEditButton"
                style="display: none"
              >
                수정 취소
              </button>
            </div>

            <div class="sub top-gap">등록된 모델 목록</div>
            <div class="table-wrap model-table-wrap">
              <table class="mini-table">
                <thead>
                  <tr>
                    <th>구분</th>
                    <th>모델명</th>
                    <th>총수량</th>
                    <th>수정</th>
                    <th>삭제</th>
                  </tr>
                </thead>
                <tbody id="modelTableBody"></tbody>
              </table>
            </div>
          </div>

          <div class="panel">
            <h2>2. 배치 등록</h2>
            <div class="pill">device_inventory 저장</div>
            <div class="sub">
              먼저 구분을 고르고, 등록된 모델 중 하나를 선택해서 배치 정보를
              넣어.
            </div>

            <label for="inventoryType">구분</label>
            <select id="inventoryType">
              <option value="tablet">태블릿</option>
              <option value="charger">충전함</option>
              <option value="desktop">데스크탑</option>
              <option value="monitor">모니터</option>
              <option value="etc">기타</option>
            </select>

            <label for="inventoryModel">모델명</label>
            <select id="inventoryModel">
              <option value="">모델을 선택해줘</option>
            </select>

            <label for="location">배치 위치</label>
            <input
              id="location"
              type="text"
              placeholder="예: 1학년 연구실 / 2-5 / 전담실"
            />

            <div class="row-3">
              <div>
                <label for="qty">수량</label>
                <input id="qty" type="number" min="1" value="1" />
              </div>
              <div>
                <label for="inventoryTotalQtyView">모델 총 수량</label>
                <input
                  id="inventoryTotalQtyView"
                  type="text"
                  readonly
                  value="-"
                />
              </div>
              <div>
                <label for="rfidRequired">RFID 등록 필요</label>
                <select id="rfidRequired">
                  <option value="N">아니오</option>
                  <option value="Y">예</option>
                </select>
              </div>
            </div>

            <label for="note">비고</label>
            <textarea
              id="note"
              placeholder="예: 전담실 7대는 충북지영 증정(RFID 등록 불가)"
            ></textarea>

            <div class="editing-banner" id="inventoryEditingBanner">
              현재 배치 수정 모드야.
            </div>

            <div class="btn-row">
              <button class="primary" id="saveInventoryButton">
                배치 추가
              </button>
              <button class="secondary" id="resetInventoryButton">
                입력칸 초기화
              </button>
            </div>

            <div class="btn-row top-gap">
              <button
                class="orange"
                id="updateInventoryButton"
                style="display: none"
              >
                배치 수정 저장
              </button>
              <button
                class="secondary"
                id="cancelInventoryEditButton"
                style="display: none"
              >
                수정 취소
              </button>
            </div>

            <label for="globalMemo">엑셀 오른쪽 메모</label>
            <textarea id="globalMemo" class="memo-box"></textarea>

            <div class="btn-row">
              <button class="green" id="excelButton">엑셀 다운로드</button>
              <button class="secondary" id="reloadButton">
                Firebase 다시 불러오기
              </button>
            </div>

            <div class="status-box" id="statusBox">
              Realtime Database 연결 전
            </div>
          </div>
        </div>

        <div class="panel">
          <h2>배치 목록</h2>

          <div class="stats" id="statsArea"></div>
          <div id="mismatchArea"></div>

          <div class="toolbar">
            <div class="sort-wrap">
              <label for="sortOption" style="margin: 0 0 6px">정렬 옵션</label>
              <select id="sortOption">
                <option value="default">기본순</option>
                <option value="model">모델명 정렬</option>
                <option value="location">배치 위치별 정렬</option>
                <option value="type">구분별 정렬</option>
              </select>
            </div>

            <button class="secondary small-btn" id="sortButton">
              정렬 적용
            </button>
            <button class="purple small-btn" id="openSummaryViewButton">
              이미지로 현황 확인하기
            </button>
          </div>

          <div class="table-wrap inventory-table-wrap">
            <table id="previewTable">
              <thead>
                <tr>
                  <th style="width: 60px">번호</th>
                  <th style="width: 100px">구분</th>
                  <th style="width: 160px">모델명</th>
                  <th>배치 위치</th>
                  <th style="width: 80px">수량</th>
                  <th style="width: 90px">RFID</th>
                  <th>비고</th>
                  <th style="width: 80px">수정</th>
                  <th style="width: 80px">삭제</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <div id="summaryModal" class="summary-modal">
      <div class="summary-modal-content">
        <div class="summary-modal-header">
          <h2>장소별 장비 현황</h2>
          <div class="summary-header-buttons">
            <button class="green small-btn" id="downloadSummaryImageButton">
              이미지 저장
            </button>
            <button class="danger small-btn" id="closeSummaryViewButton">
              닫기
            </button>
          </div>
        </div>

        <div id="summaryBoardCapture" class="summary-board-wrap">
          <div class="summary-section">
            <h3 class="summary-section-title">학년 교실</h3>
            <div id="summaryBoardMain" class="summary-board"></div>
          </div>

          <div class="summary-section">
            <h3 class="summary-section-title">특별실 / 기타 장소</h3>
            <div
              id="summaryBoardSpecial"
              class="summary-board special-board"
            ></div>
          </div>
        </div>
      </div>
    </div>

      let models = [];

      function getTypeLabel(type) {
        const map = {
          tablet: '태블릿',
          charger: '충전함',
          desktop: '데스크탑',
          monitor: '모니터',
          etc: '기타',
        };
        return map[type] || type;
      }

      function getLocationOrder(location) {
        const special = {
          '1학년 연구실': 1001,
          유치원: 1002,
          전담실: 1003,
          교무실: 1004,
          교감선생님: 1005,
          컴퓨터실: 1006,
          '늘봄 지원실(1층)': 1007,
          '2학년 교실 끝쪽 방과후 교실': 1008,
          '11(현10대)': 1009,
          '2-4에서 2대 분실': 1010,
          '전담실 3대 중 1대 타사이동(수리불가)': 1011,
        };

        if (special[location] !== undefined) return special[location];

        const match = location.match(/^(\d)-(\d)$/);
        if (match) {
          const grade = Number(match[1]);
          const cls = Number(match[2]);
          return (7 - grade) * 100 + cls;
        }

        return 9999;
      }

      function resetModelForm() {
        $('modelType').value = 'tablet';
        $('modelName').value = '';
        $('modelTotalQty').value = '0';
      }

      function resetInventoryForm() {
        $('inventoryType').value = 'tablet';
        $('location').value = '';
        $('qty').value = '1';
        $('rfidRequired').value = 'N';
        $('note').value = '';
        $('inventoryTotalQtyView').value = '-';
        updateInventoryModelOptions();
      }

      function enterModelEditMode(item) {
        editingModelId = item.id;
        $('modelType').value = item.deviceType || 'tablet';
        $('modelName').value = item.model || '';
        $('modelTotalQty').value = item.totalQty ?? 0;

        $('modelEditingBanner').style.display = 'block';
        $('saveModelButton').style.display = 'none';
        $('updateModelButton').style.display = 'block';
        $('cancelModelEditButton').style.display = 'block';
      }

      function exitModelEditMode() {
        editingModelId = null;
        resetModelForm();
        $('modelEditingBanner').style.display = 'none';
        $('saveModelButton').style.display = 'block';
        $('updateModelButton').style.display = 'none';
        $('cancelModelEditButton').style.display = 'none';
      }

      function enterInventoryEditMode(item) {
        editingInventoryId = item.id;
        $('inventoryType').value = item.deviceType || 'tablet';
        updateInventoryModelOptions(item.model);
        $('location').value = item.location || '';
        $('qty').value = item.qty ?? 1;
        $('rfidRequired').value = item.rfidRequired || 'N';
        $('note').value = item.note || '';

        $('inventoryEditingBanner').style.display = 'block';
        $('saveInventoryButton').style.display = 'none';
        $('updateInventoryButton').style.display = 'block';
        $('cancelInventoryEditButton').style.display = 'block';
      }

      function exitInventoryEditMode() {
        editingInventoryId = null;
        resetInventoryForm();
        $('inventoryEditingBanner').style.display = 'none';
        $('saveInventoryButton').style.display = 'block';
        $('updateInventoryButton').style.display = 'none';
        $('cancelInventoryEditButton').style.display = 'none';
      }

      function getModelFormData() {
        return {
          deviceType: $('modelType').value,
          model: $('modelName').value.trim(),
          totalQty: Number($('modelTotalQty').value) || 0,
        };
      }

      function getInventoryFormData() {
        return {
          deviceType: $('inventoryType').value,
          model: $('inventoryModel').value,
          location: $('location').value.trim(),
          qty: Number($('qty').value),
          rfidRequired: $('rfidRequired').value,
          note: $('note').value.trim(),
        };
      }

      function validateModelForm(data) {
        if (!data.model) {
          alert('모델명을 입력해줘.');
          return false;
        }
        return true;
      }

      function validateInventoryForm(data) {
        if (!data.model) {
          alert('배치할 모델을 선택해줘.');
          return false;
        }
        if (!data.location) {
          alert('배치 위치를 입력해줘.');
          return false;
        }
        if (!data.qty || data.qty < 1) {
          alert('수량은 1 이상이어야 해.');
          return false;
        }
        return true;
      }

      function updateInventoryModelOptions(selectedModel = '') {
        const type = $('inventoryType').value;
        const filtered = models
          .filter((m) => m.deviceType === type)
          .sort((a, b) => {
            const aOrder = modelOrder[a.model] || 9999;
            const bOrder = modelOrder[b.model] || 9999;
            return aOrder - bOrder || a.model.localeCompare(b.model, 'ko');
          });

        $('inventoryModel').innerHTML = `
          <option value="">모델을 선택해줘</option>
          ${filtered
            .map(
              (m) =>
                `<option value="${m.model}" ${m.model === selectedModel ? 'selected' : ''}>${m.model}</option>`,
            )
            .join('')}
        `;

        updateSelectedModelTotalQty();
      }

      function updateSelectedModelTotalQty() {
        const type = $('inventoryType').value;
        const model = $('inventoryModel').value;
        const found = models.find(
          (m) => m.deviceType === type && m.model === model,
        );
        $('inventoryTotalQtyView').value = found ? found.totalQty : '-';
      }

      async function addModelToFirebase() {
        const data = getModelFormData();
        if (!validateModelForm(data)) return;

        const duplicate = models.find(
          (m) => m.deviceType === data.deviceType && m.model === data.model,
        );
        if (duplicate) {
          alert('같은 구분에 같은 모델명이 이미 있어.');
          return;
        }

        try {
          setLoading(true);
          const newRef = push(ref(db, MODELS_PATH));
          await set(newRef, {
            ...data,
            createdAt: Date.now(),
            updatedAt: Date.now(),
          });
          await loadAllData();
          resetModelForm();
          setStatus('모델 저장 완료');
        } catch (error) {
          console.error(error);
          alert('모델 저장 중 오류가 났어.');
          setStatus('모델 저장 실패');
        } finally {
          setLoading(false);
        }
      }

      async function updateModelInFirebase() {
        if (!editingModelId) return;
        const data = getModelFormData();
        if (!validateModelForm(data)) return;

        const duplicate = models.find(
          (m) =>
            m.id !== editingModelId &&
            m.deviceType === data.deviceType &&
            m.model === data.model,
        );
        if (duplicate) {
          alert('같은 구분에 같은 모델명이 이미 있어.');
          return;
        }

        try {
          setLoading(true);
          await update(ref(db, `${MODELS_PATH}/${editingModelId}`), {
            ...data,
            updatedAt: Date.now(),
          });
          await loadAllData();
          exitModelEditMode();
          setStatus('모델 수정 완료');
        } catch (error) {
          console.error(error);
          alert('모델 수정 중 오류가 났어.');
          setStatus('모델 수정 실패');
        } finally {
          setLoading(false);
        }
      }

      async function deleteModelFromFirebase(id) {
        const target = models.find((m) => m.id === id);
        if (!target) return;

        const used = inventoryItems.some(
          (i) => i.deviceType === target.deviceType && i.model === target.model,
        );
        if (used) {
          alert(
            '이 모델을 사용하는 배치 정보가 있어서 삭제할 수 없어. 먼저 배치 정보를 지워줘.',
          );
          return;
        }

        if (!confirm('이 모델을 삭제할까?')) return;

        try {
          setLoading(true);
          await remove(ref(db, `${MODELS_PATH}/${id}`));
          await loadAllData();
          if (editingModelId === id) exitModelEditMode();
          setStatus('모델 삭제 완료');
        } catch (error) {
          console.error(error);
          alert('모델 삭제 중 오류가 났어.');
          setStatus('모델 삭제 실패');
        } finally {
          setLoading(false);
        }
      }

      async function addInventoryToFirebase() {
        const data = getInventoryFormData();
        if (!validateInventoryForm(data)) return;

        try {
          setLoading(true);
          const newRef = push(ref(db, INVENTORY_PATH));

          setLoading(false);
        }

        try {

          await update(ref(db, `${INVENTORY_PATH}/${editingInventoryId}`), {

      async function deleteInventoryFromFirebase(id) {

        try {
          setLoading(true);
          await remove(ref(db, `${INVENTORY_PATH}/${id}`));

          if (editingInventoryId === id) exitInventoryEditMode();
          setStatus('배치 삭제 완료');

      async function saveGlobalMemo() {
        const memo = $('globalMemo').value;
        await set(ref(db, MEMO_PATH), {
          memo,
          updatedAt: Date.now(),
        });
      }

      async function loadGlobalMemo() {
        const snapshot = await get(ref(db, MEMO_PATH));
        if (snapshot.exists()) {
          const data = snapshot.val();
          $('globalMemo').value = data?.memo || DEFAULT_MEMO;
        } else {
          $('globalMemo').value = DEFAULT_MEMO;
        }
      }

      async function loadModels() {
        const snapshot = await get(ref(db, MODELS_PATH));
        models = [];
        if (snapshot.exists()) {
          const data = snapshot.val();
          models = Object.entries(data).map(([id, value]) => ({
            id,
            ...value,
          }));
        }
      }

      async function loadInventory() {
        const snapshot = await get(ref(db, INVENTORY_PATH));
        inventoryItems = [];
        if (snapshot.exists()) {
          const data = snapshot.val();
          inventoryItems = Object.entries(data).map(([id, value]) => ({
            id,
            ...value,
          }));
        }
      }

      async function loadAllData() {
        try {
          setLoading(true);
          await Promise.all([loadModels(), loadInventory(), loadGlobalMemo()]);
          updateInventoryModelOptions();
          applySortOption(false);
          renderAll();
          setStatus(
            `모델 ${models.length}개 / 배치 ${inventoryItems.length}개 불러옴`,
          );
        } catch (error) {
          console.error(error);
          alert(`Realtime Database 데이터 불러오기 실패: ${error.message}`);
          setStatus(`불러오기 실패: ${error.message}`);
        } finally {
          setLoading(false);
        }
      }

      function sortByDefault(arr) {
        return arr.sort((a, b) => {
          const typeDiff =
            (typeOrder[a.deviceType] || 999) - (typeOrder[b.deviceType] || 999);
          if (typeDiff !== 0) return typeDiff;

          const modelDiff =
            (modelOrder[a.model] || 9999) - (modelOrder[b.model] || 9999);
          if (modelDiff !== 0) return modelDiff;

          const locDiff =
            getLocationOrder(a.location) - getLocationOrder(b.location);
          if (locDiff !== 0) return locDiff;

          return a.location.localeCompare(b.location, 'ko');
        });
      }

      function sortByModel(arr) {
        return arr.sort((a, b) => {
          const modelDiff = a.model.localeCompare(b.model, 'ko');
          if (modelDiff !== 0) return modelDiff;

          const typeDiff =
            (typeOrder[a.deviceType] || 999) - (typeOrder[b.deviceType] || 999);
          if (typeDiff !== 0) return typeDiff;

          const locDiff =
            getLocationOrder(a.location) - getLocationOrder(b.location);
          if (locDiff !== 0) return locDiff;

          return a.location.localeCompare(b.location, 'ko');
        });
      }

      function sortByLocation(arr) {
        return arr.sort((a, b) => {
          const locDiff =
            getLocationOrder(a.location) - getLocationOrder(b.location);
          if (locDiff !== 0) return locDiff;

          const locTextDiff = a.location.localeCompare(b.location, 'ko');
          if (locTextDiff !== 0) return locTextDiff;

          const typeDiff =
            (typeOrder[a.deviceType] || 999) - (typeOrder[b.deviceType] || 999);
          if (typeDiff !== 0) return typeDiff;

          return a.model.localeCompare(b.model, 'ko');
        });
      }

      function sortByType(arr) {
        return arr.sort((a, b) => {
          const typeDiff =
            (typeOrder[a.deviceType] || 999) - (typeOrder[b.deviceType] || 999);
          if (typeDiff !== 0) return typeDiff;

          const modelDiff = a.model.localeCompare(b.model, 'ko');
          if (modelDiff !== 0) return modelDiff;

          const locDiff =
            getLocationOrder(a.location) - getLocationOrder(b.location);
          if (locDiff !== 0) return locDiff;

          return a.location.localeCompare(b.location, 'ko');
        });
      }

      function applySortOption(shouldRender = true) {
        const option = $('sortOption').value;

        if (option === 'default') sortByDefault(inventoryItems);
        else if (option === 'model') sortByModel(inventoryItems);
        else if (option === 'location') sortByLocation(inventoryItems);
        else if (option === 'type') sortByType(inventoryItems);

        if (shouldRender) renderAll();
      }

      function getModelTotalQty(deviceType, model) {
        const found = models.find(
          (m) => m.deviceType === deviceType && m.model === model,
        );
        return found ? Number(found.totalQty || 0) : 0;
      }

      function getModelAssignedQty(deviceType, model) {
        return inventoryItems
          .filter((i) => i.deviceType === deviceType && i.model === model)
          .reduce((sum, i) => sum + Number(i.qty), 0);
      }

      function getMismatchModels() {
        return models
          .map((m) => {
            const totalQty = Number(m.totalQty || 0);
            const assignedQty = getModelAssignedQty(m.deviceType, m.model);
            const isMismatch =
              m.deviceType === 'tablet' &&
              totalQty > 0 &&
              totalQty !== assignedQty;

            return {
              ...m,
              totalQty,
              assignedQty,
              isMismatch,
              diff: totalQty - assignedQty,
            };
          })
          .filter((m) => m.isMismatch)
          .sort((a, b) => {
            const orderA = modelOrder[a.model] || 9999;
            const orderB = modelOrder[b.model] || 9999;
            return orderA - orderB;
          });
      }

      function renderMismatchArea() {
        const area = $('mismatchArea');
        const mismatches = getMismatchModels();

        if (!mismatches.length) {
          area.innerHTML = `
            <div class="warning-empty">
              모든 태블릿 모델의 총수량과 배치합이 일치해.
            </div>
          `;
          return;
        }

        area.innerHTML = `
          <div class="warning-box">
            <div class="warning-title">수량 불일치 태블릿 모델</div>
            <div class="warning-list">
              ${mismatches
                .map(
                  (item) => `
                    <div class="warning-item">
                      <b>${item.model}</b> |
                      총수량: <b>${item.totalQty}</b> /
                      배치합: <b>${item.assignedQty}</b> /
                      차이: <b>${item.diff > 0 ? '+' + item.diff : item.diff}</b>
                    </div>
                  `,
                )
                .join('')}
            </div>
          </div>
        `;
      }

      function renderStats() {
        const area = $('statsArea');
        const tabletCount = inventoryItems
          .filter((i) => i.deviceType === 'tablet')
          .reduce((s, i) => s + Number(i.qty), 0);
        const chargerCount = inventoryItems
          .filter((i) => i.deviceType === 'charger')
          .reduce((s, i) => s + Number(i.qty), 0);
        const desktopCount = inventoryItems
          .filter((i) => i.deviceType === 'desktop')
          .reduce((s, i) => s + Number(i.qty), 0);
        const monitorCount = inventoryItems
          .filter((i) => i.deviceType === 'monitor')
          .reduce((s, i) => s + Number(i.qty), 0);
        const mismatchCount = getMismatchModels().length;

        area.innerHTML = `
          <div class="stat">등록 모델 수: <b>${models.length}</b></div>
          <div class="stat">배치 행 수: <b>${inventoryItems.length}</b></div>
          <div class="stat">태블릿 수량: <b>${tabletCount}</b></div>
          <div class="stat">충전함 수량: <b>${chargerCount}</b></div>
          <div class="stat">데스크탑 수량: <b>${desktopCount}</b></div>
          <div class="stat">모니터 수량: <b>${monitorCount}</b></div>
          <div class="stat">불일치 태블릿 모델 수: <b>${mismatchCount}</b></div>
        `;
      }

      function renderModelTable() {
        const tbody = $('modelTableBody');
        tbody.innerHTML = '';

        const sorted = [...models].sort((a, b) => {
          const typeDiff =
            (typeOrder[a.deviceType] || 999) - (typeOrder[b.deviceType] || 999);
          if (typeDiff !== 0) return typeDiff;
          const modelDiff =
            (modelOrder[a.model] || 9999) - (modelOrder[b.model] || 9999);
          if (modelDiff !== 0) return modelDiff;
          return a.model.localeCompare(b.model, 'ko');
        });

        sorted.forEach((item) => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${getTypeLabel(item.deviceType)}</td>
            <td>${item.model}</td>
            <td>${item.totalQty || 0}</td>
            <td><button class="orange small-btn" data-model-edit="${item.id}">수정</button></td>
            <td><button class="danger small-btn" data-model-delete="${item.id}">삭제</button></td>
          `;
          tbody.appendChild(tr);
        });

        tbody.querySelectorAll('[data-model-edit]').forEach((btn) => {
          btn.addEventListener('click', () => {
            const id = btn.dataset.modelEdit;
            const item = models.find((x) => x.id === id);
            if (item) enterModelEditMode(item);
          });
        });

        tbody.querySelectorAll('[data-model-delete]').forEach((btn) => {
          btn.addEventListener('click', () =>
            deleteModelFromFirebase(btn.dataset.modelDelete),
          );
        });

      function renderInventoryTable() {
        const tbody = document.querySelector('#previewTable tbody');
        tbody.innerHTML = '';

        inventoryItems.forEach((item, index) => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${index + 1}</td>
            <td>${getTypeLabel(item.deviceType)}</td>
            <td>${item.model}</td>

            <td>${item.qty}</td>
            <td>${item.rfidRequired}</td>
            <td class="left">${item.note || ''}</td>
            <td><button class="orange small-btn" data-edit="${item.id}">수정</button></td>
            <td><button class="danger small-btn" data-delete="${item.id}">삭제</button></td>
          `;
          tbody.appendChild(tr);
        });

        tbody.querySelectorAll('[data-edit]').forEach((btn) => {
          btn.addEventListener('click', () => {
            const id = btn.dataset.edit;
            const item = inventoryItems.find((x) => x.id === id);
            if (item) enterInventoryEditMode(item);
          });
        });

        tbody.querySelectorAll('[data-delete]').forEach((btn) => {
          btn.addEventListener('click', () =>
            deleteInventoryFromFirebase(btn.dataset.delete),
          );

      function renderAll() {
        renderStats();
        renderMismatchArea();
        renderModelTable();
        renderInventoryTable();
      }

      function groupByModel(data) {
        const grouped = {};
        data.forEach((item) => {
          if (!grouped[item.model]) grouped[item.model] = [];
          grouped[item.model].push(item);
        });

        const sortedKeys = Object.keys(grouped).sort(
          (a, b) => (modelOrder[a] || 9999) - (modelOrder[b] || 9999),
        );
        const sortedGrouped = {};
        sortedKeys.forEach((key) => {
          sortedGrouped[key] = grouped[key].sort((x, y) => {
            const diff =
              getLocationOrder(x.location) - getLocationOrder(y.location);
            if (diff !== 0) return diff;
            return x.location.localeCompare(y.location, 'ko');
          });
        });

        return sortedGrouped;
      }

      function setCell(ws, addr, value, style = {}) {
        const baseBorder = {
          top: { style: 'thin', color: { rgb: '000000' } },
          bottom: { style: 'thin', color: { rgb: '000000' } },
          left: { style: 'thin', color: { rgb: '000000' } },
          right: { style: 'thin', color: { rgb: '000000' } },
        };

        const baseStyle = {
          alignment: {
            horizontal: 'center',
            vertical: 'center',
            wrapText: true,
          },
          border: baseBorder,
          font: { name: 'Malgun Gothic', sz: 10 },
        };

        ws[addr] = {
          v: value,
          t: typeof value === 'number' ? 'n' : 's',
          s: { ...baseStyle, ...style },
        };
      }

      function fillModelBlock(
        ws,
        startRow,
        title,
        grouped,
        titleColor,
        deviceType,
      ) {
        let row = startRow;

        setCell(ws, `A${row}`, title, {
          fill: { fgColor: { rgb: titleColor } },
          font: { bold: true, name: 'Malgun Gothic', sz: 11 },
        });
        row++;

        Object.keys(grouped).forEach((model) => {
          const modelItems = grouped[model];
          const fillColor = modelColors[model] || 'E5E7EB';

          const totalQty = getModelTotalQty(deviceType, model);
          const assignedQty = getModelAssignedQty(deviceType, model);
          const isMismatch =
            deviceType === 'tablet' && totalQty > 0 && totalQty !== assignedQty;

          setCell(ws, `A${row}`, model, {
            fill: { fgColor: { rgb: isMismatch ? 'F4CCCC' : fillColor } },
            font: {
              bold: true,
              color: { rgb: isMismatch ? 'C00000' : '000000' },
            },
          });

          modelItems.forEach((item, idx) => {
            const col = XLSX.utils.encode_col(idx + 1);
            setCell(ws, `${col}${row}`, item.location, {
              fill: { fgColor: { rgb: isMismatch ? 'F4CCCC' : fillColor } },
              font: {
                bold: true,
                color: { rgb: isMismatch ? 'C00000' : '000000' },
              },
            });
          });

          row++;

          setCell(ws, `A${row}`, totalQty || 0, {
            fill: { fgColor: { rgb: isMismatch ? 'FDE9D9' : 'FFFFFF' } },
            font: {
              bold: true,
              color: { rgb: isMismatch ? 'C00000' : '000000' },
            },
          });

          modelItems.forEach((item, idx) => {
            const col = XLSX.utils.encode_col(idx + 1);
            const qtyText =
              item.note && String(item.note).trim()
                ? `${Number(item.qty)}(${String(item.note).trim()})`
                : `${Number(item.qty)}`;

            setCell(ws, `${col}${row}`, qtyText, {
              font: { color: { rgb: isMismatch ? 'C00000' : '000000' } },
            });
          });

          row++;
        });

        return row;
      }

      function downloadExcel() {
        if (!inventoryItems.length) {
          alert('데이터가 없어.');
          return;
        }

        const wb = XLSX.utils.book_new();
        const ws = {};

        const tabletItems = inventoryItems.filter(
          (i) => i.deviceType === 'tablet',
        );
        const chargerItems = inventoryItems.filter(
          (i) => i.deviceType === 'charger',
        );
        const desktopItems = inventoryItems.filter(
          (i) => i.deviceType === 'desktop',
        );
        const monitorItems = inventoryItems.filter(
          (i) => i.deviceType === 'monitor',
        );
        const etcItems = inventoryItems.filter((i) => i.deviceType === 'etc');

        let row = 1;

        const tabletGrouped = groupByModel(tabletItems);
        row = fillModelBlock(
          ws,
          row,
          '태블릿',
          tabletGrouped,
          'FFF2CC',
          'tablet',
        );

        const tabletTotal = tabletItems.reduce((s, i) => s + Number(i.qty), 0);
        setCell(ws, `A${row}`, '총잔량', {
          fill: { fgColor: { rgb: 'FCE5CD' } },
          font: { bold: true },
        });
        setCell(ws, `B${row}`, tabletTotal, {
          fill: { fgColor: { rgb: 'FCE5CD' } },
          font: { bold: true },
        });

        row += 2;

        const chargerGrouped = groupByModel(chargerItems);
        row = fillModelBlock(
          ws,
          row,
          '충전함',
          chargerGrouped,
          'FCE5CD',
          'charger',
        );

        const chargerTotal = chargerItems.reduce(
          (s, i) => s + Number(i.qty),
          0,
        );
        setCell(ws, `A${row}`, '총잔량', {
          fill: { fgColor: { rgb: 'FCE5CD' } },
          font: { bold: true },
        });
        setCell(ws, `B${row}`, chargerTotal, {
          fill: { fgColor: { rgb: 'FCE5CD' } },
          font: { bold: true },
        });

        let sideRow = 22;

        if (desktopItems.length) {
          const desktopGrouped = groupByModel(desktopItems);
          setCell(ws, `L${sideRow}`, '데스크탑', {
            fill: { fgColor: { rgb: '58C4DD' } },
            font: { bold: true },
          });
          setCell(ws, `M${sideRow}`, 'RFID 등록 필요', {
            font: { bold: true, color: { rgb: 'FF0000' } },
          });
          sideRow++;

          Object.keys(desktopGrouped).forEach((model) => {
            const rows = desktopGrouped[model];
            const total = rows.reduce((sum, i) => sum + Number(i.qty), 0);
            setCell(ws, `L${sideRow}`, model, {
              fill: { fgColor: { rgb: 'BEE3F8' } },
            });
            setCell(ws, `M${sideRow}`, rows.map((r) => r.location).join(', '));
            setCell(ws, `Q${sideRow}`, `총 ${total}대`);
            sideRow++;
          });
        }

        sideRow += 2;

        if (monitorItems.length) {
          const monitorGrouped = groupByModel(monitorItems);
          setCell(ws, `L${sideRow}`, '모니터', {
            fill: { fgColor: { rgb: 'D9D9D9' } },
            font: { bold: true },
          });
          setCell(ws, `M${sideRow}`, 'RFID 등록 필요', {
            font: { bold: true, color: { rgb: 'FF0000' } },
          });
          sideRow++;

          Object.keys(monitorGrouped).forEach((model) => {
            const rows = monitorGrouped[model];
            const total = rows.reduce((sum, i) => sum + Number(i.qty), 0);
            const text = rows
              .map((r) => (r.note ? `${r.location}, ${r.note}` : r.location))
              .join(', ');
            setCell(ws, `L${sideRow}`, model, {
              fill: { fgColor: { rgb: 'BEE3F8' } },
            });
            setCell(ws, `M${sideRow}`, text);
            setCell(ws, `Q${sideRow}`, `총 ${total}대`);
            sideRow++;
          });
        }

        if (etcItems.length) {
          sideRow += 2;
          setCell(ws, `L${sideRow}`, '기타', {
            fill: { fgColor: { rgb: 'E9D5FF' } },
            font: { bold: true },
          });
          sideRow++;

          etcItems.forEach((item) => {
            setCell(ws, `L${sideRow}`, item.model);
            setCell(ws, `M${sideRow}`, item.location);
            setCell(ws, `N${sideRow}`, Number(item.qty));
            setCell(ws, `O${sideRow}`, item.note || '');
            sideRow++;
          });
        }

        const memo = $('globalMemo').value.trim();
        if (memo) {
          const memoLines = memo.split('\n');
          let memoRow = 4;
          memoLines.forEach((line) => {
            setCell(ws, `L${memoRow}`, line, {
              alignment: {
                horizontal: 'left',
                vertical: 'center',
                wrapText: true,
              },
              font: { name: 'Malgun Gothic', sz: 10 },
            });
            memoRow += 4;
          });
        }

        ws['!cols'] = [
          { wch: 16 },
          { wch: 14 },
          { wch: 14 },
          { wch: 14 },
          { wch: 14 },
          { wch: 14 },
          { wch: 14 },
          { wch: 14 },
          { wch: 14 },
          { wch: 14 },
          { wch: 4 },
          { wch: 16 },
          { wch: 22 },
          { wch: 18 },
          { wch: 18 },
          { wch: 18 },
          { wch: 10 },
        ];

        ws['!ref'] = XLSX.utils.encode_range({
          s: { r: 0, c: 0 },
          e: { r: Math.max(row + 4, sideRow + 2), c: 16 },
        });

        XLSX.utils.book_append_sheet(wb, ws, '장비 관리');
        XLSX.writeFile(wb, '장비_관리대장.xlsx');
      }

      function buildLocationSummary(location) {
        const rows = inventoryItems.filter(
          (item) => item.location === location,
        );

        const tablets = rows
          .filter((item) => item.deviceType === 'tablet')
          .map((item) => `${item.model} ${item.qty}대`);

        const chargers = rows
          .filter((item) => item.deviceType === 'charger')
          .map((item) => item.model);

        const desktops = rows
          .filter((item) => item.deviceType === 'desktop')
          .map((item) => `${item.model} ${item.qty}대`);

        const monitors = rows
          .filter((item) => item.deviceType === 'monitor')
          .map((item) => `${item.model} ${item.qty}대`);

        return {
          location,
          tablets,
          chargers,
          desktops,
          monitors,
        };
      }

      function makeSummaryCard(location, isPlaceholder = false) {
        const summary = buildLocationSummary(location);
        const hasContent =
          summary.tablets.length ||
          summary.chargers.length ||
          summary.desktops.length ||
          summary.monitors.length;

        const tags = [];
        const lines = [];

        if (summary.tablets.length)
          tags.push(`<span class="summary-tag">태블릿</span>`);
        if (summary.chargers.length)
          tags.push(`<span class="summary-tag">충전함</span>`);
        if (summary.desktops.length)
          tags.push(`<span class="summary-tag">데스크탑</span>`);
        if (summary.monitors.length)
          tags.push(`<span class="summary-tag">모니터</span>`);

        if (summary.chargers.length) {
          lines.push(
            `<div class="summary-card-line">충전함- ${summary.chargers.join(', ')}</div>`,
          );
        }
        if (summary.tablets.length) {
          lines.push(
            `<div class="summary-card-line">태블릿- ${summary.tablets.join(', ')}</div>`,
          );
        }
        if (summary.desktops.length) {
          lines.push(
            `<div class="summary-card-line">데스크탑- ${summary.desktops.join(', ')}</div>`,
          );
        }
        if (summary.monitors.length) {
          lines.push(
            `<div class="summary-card-line">모니터- ${summary.monitors.join(', ')}</div>`,
          );
        }

        if (!hasContent) {
          lines.push(`<div class="summary-card-empty">등록된 장비 없음</div>`);
        }

        return `
          <div class="summary-card ${isPlaceholder ? 'placeholder' : ''}">
            <div class="summary-card-title">${location}</div>
            <div class="summary-card-tags">${tags.join('')}</div>
            ${lines.join('')}
          </div>
        `;
      }

      function renderSummaryBoard() {
        const mainBoard = $('summaryBoardMain');
        const specialBoard = $('summaryBoardSpecial');

        mainBoard.innerHTML = SUMMARY_MAIN_ORDER.map((location) =>
          makeSummaryCard(location, true),
        ).join('');

        const existingSpecialLocations = [
          ...new Set(
            inventoryItems
              .map((item) => item.location)
              .filter((location) => !SUMMARY_MAIN_ORDER.includes(location)),
          ),
        ];

        const orderedSpecial = [
          ...SUMMARY_SPECIAL_ORDER.filter(
            (loc) =>
              existingSpecialLocations.includes(loc) ||
              SUMMARY_SPECIAL_ORDER.includes(loc),
          ),
          ...existingSpecialLocations
            .filter((loc) => !SUMMARY_SPECIAL_ORDER.includes(loc))
            .sort((a, b) => a.localeCompare(b, 'ko')),
        ];

        const uniqueSpecial = [...new Set(orderedSpecial)];

        specialBoard.innerHTML = uniqueSpecial
          .map((location) => makeSummaryCard(location, true))
          .join('');
      }

      function openSummaryView() {
        renderSummaryBoard();
        $('summaryModal').style.display = 'flex';
      }

      function closeSummaryView() {
        $('summaryModal').style.display = 'none';
      }

      async function downloadSummaryImage() {
        const target = $('summaryBoardCapture');
        const canvas = await html2canvas(target, {
          backgroundColor: '#f8fbff',
          scale: 2,
          useCORS: true,
        });

        const link = document.createElement('a');
        link.download = '장소별_장비_현황.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      }

      $('saveModelButton').addEventListener('click', addModelToFirebase);
      $('updateModelButton').addEventListener('click', updateModelInFirebase);
      $('cancelModelEditButton').addEventListener('click', exitModelEditMode);
      $('resetModelButton').addEventListener('click', resetModelForm);

      $('saveInventoryButton').addEventListener(
        'click',
        addInventoryToFirebase,
      );
      $('updateInventoryButton').addEventListener(
        'click',
        updateInventoryInFirebase,
      );
      $('cancelInventoryEditButton').addEventListener(
        'click',
        exitInventoryEditMode,
      );
      $('resetInventoryButton').addEventListener('click', resetInventoryForm);

      $('inventoryType').addEventListener('change', () =>
        updateInventoryModelOptions(),
      );
      $('inventoryModel').addEventListener(
        'change',
        updateSelectedModelTotalQty,
      );

      $('sortButton').addEventListener('click', () => applySortOption(true));
      $('reloadButton').addEventListener('click', loadAllData);
      $('excelButton').addEventListener('click', downloadExcel);

      $('openSummaryViewButton').addEventListener('click', openSummaryView);
      $('closeSummaryViewButton').addEventListener('click', closeSummaryView);
      $('downloadSummaryImageButton').addEventListener(
        'click',
        downloadSummaryImage,
      );

      $('summaryModal').addEventListener('click', (e) => {
        if (e.target === $('summaryModal')) closeSummaryView();
      });

      $('globalMemo').addEventListener('change', async () => {
        try {
          await saveGlobalMemo();
          setStatus('메모 저장 완료');
        } catch (error) {
          console.error(error);
          setStatus('메모 저장 실패');
        }
      });

      loadAllData();
    </script>
  </body>
</html>
